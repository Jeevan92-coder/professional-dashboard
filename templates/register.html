<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - Professional System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1> User Registration</h1>
        <p class="subtitle">Professional User Management System</p>

        <!-- Flash Messages (success/error alerts) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Registration Form -->
        <form method="POST" action="/register" id="registerForm">
            
            <!-- Username -->
            <div class="form-group">
                <label for="username">Username </label>
                <input type="text" id="username" name="username" 
                       placeholder="e.g., rahul_123" required>
            </div>

            <!-- First Name -->
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" 
                       placeholder="Enter your first name" required>
            </div>

            <!-- Last Name -->
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" 
                       placeholder="Enter your last name" required>
            </div>

            <!-- Date of Birth -->
            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <!-- Mobile Number -->
            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" 
                       placeholder="10-digit mobile number" 
                       pattern="[0-9]{10}" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" 
                       placeholder="your.email@example.com" required>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-container">
                    <input type="password" id="password" name="password" 
                           placeholder="Minimum 8 characters" 
                           minlength="8" required>
                    <button type="button" class="eye-btn" 
                            onclick="togglePassword('password')">👁️</button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="password-container">
                    <input type="password" id="confirm_password" 
                           name="confirm_password" 
                           placeholder="Re-enter password" 
                           minlength="8" required>
                    <button type="button" class="eye-btn" 
                            onclick="togglePassword('confirm_password')">👁️</button>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Register Now </button>
        </form>

        <!-- Login Link -->
        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
